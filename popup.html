<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiChat RTL Supporter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            width: 320px;
            height: auto;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
            background: transparent !important;

        }

        .logo-icon {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 15px rgba(102, 126, 234, 0.3));
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .title {
            font-size: 14px;
            font-weight: 500;
            color: #e0e0e0;
            text-align: center;
            letter-spacing: 0.3px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .title span {
            color: #667eea;
            font-weight: 600;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            margin: 4px 0;
        }

        .dev-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 12px;
            color: #a0a0c0;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        .dev-info::before {
            content: "👨‍💻";
            font-size: 14px;
        }

        .social-links {
            display: flex;
            gap: 20px;
            margin-top: 4px;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .social-links a:hover {
            transform: translateY(-4px);
            background: rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .social-links img {
            width: 22px;
            height: 22px;
            object-fit: contain;
            filter: brightness(0) invert(1);
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .social-links a:hover img {
            opacity: 1;
        }

        .version {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container>* {
            animation: fadeInUp 0.4s ease forwards;
            opacity: 0;
        }

        .container>*:nth-child(1) {
            animation-delay: 0s;
        }

        .container>*:nth-child(2) {
            animation-delay: 0.05s;
        }

        .container>*:nth-child(3) {
            animation-delay: 0.1s;
        }

        .container>*:nth-child(4) {
            animation-delay: 0.15s;
        }

        .container>*:nth-child(5) {
            animation-delay: 0.2s;
        }

        .container>*:nth-child(6) {
            animation-delay: 0.25s;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo-section">
            <img class="logo-icon" src="./icons/icon_16.svg">
            <div class="logo-text">AiChat RTL</div>
        </div>

        <div class="title">
            <span>RTL Support</span> for AI Chatbots
        </div>

        <div class="divider"></div>

        <div class="dev-info">
            Developed by Gorbekhan
        </div>

        <div class="social-links">
            <a href="https://github.com/Gorbekhan01" target="_blank" title="GitHub">
                <img src="./icons/github.svg" alt="GitHub">
            </a>
            <a href="https://gorbekhan.vercel.app/" target="_blank" title="Website">
                <img src="./icons/website.svg" alt="Website">
            </a>
        </div>

        <div class="version">
            v1.0.0
        </div>

    </div>

</body>

</html>
